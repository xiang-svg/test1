<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 网页编码，防止乱码 -->
    <meta charset="UTF-8">
    <!-- 适配手机端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 网页标题（浏览器标签显示） -->
    <title>我的第一个HTML页面</title>
</head>
<body>
    <!-- 页面主体内容 -->
    <h1>你好，这是一个简单的HTML页面</h1>
    <p>这是一段普通文字，HTML非常容易上手！</p>
    
    <!-- 按钮 -->
    <button onclick="alert('你点击了按钮！')">点我试试</button>
    
    <!-- 分割线 -->
    <hr>
    
    <!-- 链接 -->
    <a href="https://www.baidu.com" target="_blank">打开百度</a>
</body>
</html>
